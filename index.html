<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSB ELITE STRIKE INTERFACE</title>
    <style>
        :root {
            --neon-blue: #00e5ff;
            --neon-red: #ff0055;
            --neon-green: #39ff14;
            --terminal-bg: #030303;
        }

        body {
            background-color: var(--terminal-bg);
            color: #fff;
            font-family: 'Segoe UI', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .cyber-box {
            width: 90%;
            max-width: 700px;
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.15);
            padding: 30px;
            position: relative;
        }

        .cyber-box::before {
            content: "SECURED_CONNECTION_ACTIVE";
            position: absolute;
            top: -10px;
            right: 20px;
            background: var(--neon-blue);
            color: #000;
            font-size: 10px;
            padding: 2px 8px;
            font-weight: bold;
        }

        h1 {
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 5px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            margin-bottom: 20px;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            color: var(--neon-green);
            font-size: 1rem;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #0a0a0a;
            border: 1px solid #222;
            padding: 10px;
            font-size: 0.8rem;
        }

        .stat-card span {
            color: var(--neon-blue);
            display: block;
            margin-bottom: 5px;
        }

        .terminal-window {
            height: 200px;
            background: #000;
            border: 1px solid #1a1a1a;
            padding: 10px;
            font-size: 0.8rem;
            color: var(--neon-green);
            overflow-y: scroll;
            margin-bottom: 20px;
            border-left: 2px solid var(--neon-red);
        }

        .btn-strike {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-strike:hover {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 20px var(--neon-red);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

<div class="cyber-box">
    <h1>MULTI-PROTOCOL STRIKE v9.0</h1>
    
    <input type="text" id="targetId" class="input-field" placeholder="INPUT TARGET ID OR PROFILE LINK">

    <div class="stats-grid">
        <div class="stat-card">
            <span>ACTIVE PROXY</span>
            <div id="proxy-val">ENCRYPTED</div>
        </div>
        <div class="stat-card">
            <span>REPORT THREADS</span>
            <div>999+ / INFINITE</div>
        </div>
    </div>

    <div class="terminal-window" id="terminal">
        [SYSTEM] WAITING FOR TARGET AUTHORIZATION...
    </div>

    <button class="btn-strike" onclick="executeStrike()">Execute Unlimited Sequence</button>
</div>

<script>
    function executeStrike() {
        const terminal = document.getElementById('terminal');
        const target = document.getElementById('targetId').value || "TARGET_X";
        const proxyVal = document.getElementById('proxy-val');
        
        let reportCategories = [
            "Under 18 Violation", "Harassment & Bullying", "Self-Harm Alert", 
            "Violent Content", "Restricted Goods", "Adult Material", 
            "Scam & Fraud", "Intellectual Property"
        ];

        let count = 0;

        function logNext() {
            const category = reportCategories[Math.floor(Math.random() * reportCategories.length)];
            const randomIP = `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
            
            const logs = [
                `<span style="color: #666">[${new Date().toLocaleTimeString()}]</span> <span style="color:var(--neon-blue)">IP_ROTATED:</span> ${randomIP}`,
                `<span style="color: #666">[${new Date().toLocaleTimeString()}]</span> <span style="color:var(--neon-red)">SENDING_REPORT:</span> [${category}] to ${target}`,
                `<span style="color: #666">[${new Date().toLocaleTimeString()}]</span> <span style="color:var(--neon-green)">STATUS:</span> REQUEST_ACCEPTED_BY_NODE`
            ];

            proxyVal.innerText = randomIP;
            
            logs.forEach((msg, index) => {
                setTimeout(() => {
                    terminal.innerHTML += `<div>${msg}</div>`;
                    terminal.scrollTop = terminal.scrollHeight;
                }, index * 200);
            });

            count++;
            // Infinite loop simulation
            setTimeout(logNext, 1500);
        }

        terminal.innerHTML = `<div>[ALERT] INITIALIZING INFINITE ATTACK ON: ${target}</div>`;
        logNext();
    }
</script>

</body>
</html>
