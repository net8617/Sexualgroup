<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSB | TikTok Advanced Strike Engine</title>
    <style>
        :root {
            --tk-red: #ff0050;
            --tk-cyan: #00f2ea;
            --dark-core: #010101;
            --terminal-green: #00ff41;
        }

        body {
            background-color: var(--dark-core);
            color: white;
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .strike-panel {
            width: 95%;
            max-width: 650px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(255, 0, 80, 0.15);
            position: relative;
        }

        .strike-panel::after {
            content: "TIKTOK_STRIKE_PROTOCOL_V2";
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--tk-red);
            color: white;
            padding: 2px 10px;
            font-size: 10px;
            font-weight: bold;
            border-radius: 4px;
        }

        h2 {
            text-align: center;
            font-size: 1.4rem;
            color: var(--tk-cyan);
            letter-spacing: 3px;
            margin-bottom: 20px;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 12px;
            background: #0a0a0a;
            border: 1px solid #444;
            color: var(--tk-cyan);
            border-radius: 5px;
            outline: none;
        }

        input:focus {
            border-color: var(--tk-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 234, 0.2);
        }

        .grid-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .option {
            background: #111;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #ccc;
            border: 1px solid #222;
            cursor: pointer;
            transition: 0.2s;
        }

        .option:hover {
            border-color: var(--tk-red);
            color: white;
        }

        .terminal {
            height: 180px;
            background: black;
            border: 1px solid #1a1a1a;
            padding: 10px;
            font-size: 0.75rem;
            color: var(--terminal-green);
            overflow-y: auto;
            margin-bottom: 20px;
            border-radius: 5px;
            line-height: 1.5;
        }

        .btn-launch {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--tk-red), #90002d);
            border: none;
            color: white;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 5px;
            text-transform: uppercase;
        }

        .btn-launch:active { transform: scale(0.98); }

        .status-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #666;
            margin-top: 10px;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

<div class="strike-panel">
    <h2>CSB ADVANCED ENGINE</h2>
    
    <div class="input-section">
        <input type="text" id="targetInput" placeholder="Enter TikTok @username or Video Link...">
    </div>

    <div class="grid-options">
        <div class="option">[X] Minor Safety</div>
        <div class="option">[X] Hate Speech</div>
        <div class="option">[X] Dangerous Acts</div>
        <div class="option">[X] Illegal Goods</div>
        <div class="option">[X] Harassment</div>
        <div class="option">[X] Spam Content</div>
    </div>

    <div class="terminal" id="termLog">
        [SYSTEM] STANDBY. AWAITING DATA...
    </div>

    <button class="btn-launch" onclick="startEngine()">Execute Multi-Thread Strike</button>

    <div class="status-row">
        <span>ENCRYPTION: ACTIVE</span>
        <span id="ipStatus">IP: STABLE</span>
        <span>NODE: CSB-DHAKA</span>
    </div>
</div>

<script>
    function startEngine() {
        const log = document.getElementById('termLog');
        const target = document.getElementById('targetInput').value || "TARGET_UNDEFINED";
        const ipStatus = document.getElementById('ipStatus');
        
        log.innerHTML = `<span style="color:white">[!] INITIALIZING ATTACK SEQUENCE ON: ${target}</span>`;
        
        let counter = 0;
        const categories = ["Minor Safety", "Illegal Goods", "Spam", "Hate Speech", "Harassment"];

        const attackInterval = setInterval(() => {
            const randomIP = `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
            const randomCategory = categories[Math.floor(Math.random()*categories.length)];
            
            const messages = [
                `> ROTATING PROXY... NEW IP: ${randomIP}`,
                `> BYPASSING RATE-LIMIT FOR CATEGORY: [${randomCategory}]`,
                `> SENDING ENCRYPTED REPORT PACKET...`,
                `<span style="color:${counter % 2 === 0 ? '#ff0050' : '#00f2ea'}">> STRIKE LOGGED SUCCESSFULLY [ID: ${Math.floor(Math.random()*99999)}]</span>`
            ];

            const msg = messages[counter % messages.length];
            log.innerHTML += `<div>${msg}</div>`;
            log.scrollTop = log.scrollHeight;
            
            if(msg.includes("IP:")) {
                ipStatus.innerText = "IP: " + randomIP;
                ipStatus.style.color = "var(--tk-cyan)";
            }

            counter++;
            
            // Limit for simulation safety, but visually loops
            if(counter > 1000) {
                log.innerHTML += `<br><span style="color:red">SYSTEM ALERT: INFINITE LOOP MODE ACTIVE</span>`;
            }
        }, 500);
    }
</script>

</body>
</html>
