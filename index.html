<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto FB ID Report | CSB</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            border: 2px solid #00ff41;
            padding: 30px;
            background: rgba(0, 20, 0, 0.9);
            box-shadow: 0 0 20px #00ff41;
            text-align: center;
            width: 90%;
            max-width: 500px;
            border-radius: 10px;
        }

        h1 {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff41;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #00ff41;
            color: #00ff41;
            outline: none;
            box-sizing: border-box;
        }

        button {
            padding: 10px 25px;
            background: #00ff41;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: #000;
            color: #00ff41;
            border: 1px solid #00ff41;
            box-shadow: 0 0 15px #00ff41;
        }

        .status-box {
            margin-top: 20px;
            font-size: 0.9rem;
            height: 60px;
            overflow-y: auto;
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        .footer {
            margin-top: 25px;
            font-size: 0.8rem;
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        .glow-text {
            color: #ff003c;
            text-shadow: 0 0 5px #ff003c;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>অটো ফেসবুক আইডি রিপোর্ট</h1>
    <p>Target Link বসান নিচে:</p>
    
    <div class="input-group">
        <input type="text" id="targetLink" placeholder="https://www.facebook.com/profile.php?id=...">
    </div>

    <button onclick="startReporting()">রিপোর্ট শুরু করুন</button>

    <div class="status-box" id="status">
        সিস্টেম রেডি... কমান্ডের জন্য অপেক্ষা করছে।
    </div>

    <div class="footer">
        <p>Developer: <span class="glow-text">DARK SILENCE ( MAHIR )</span></p>
        <p>Team: <strong>Cyber Sentinel Bangladesh</strong></p>
    </div>
</div>

<script>
    function startReporting() {
        const link = document.getElementById('targetLink').value;
        const status = document.getElementById('status');

        if (!link) {
            alert("অনুগ্রহ করে আইডির লিংক দিন!");
            return;
        }

        status.innerHTML = "টার্গেট লক করা হয়েছে...<br>";
        
        let count = 1;
        const interval = setInterval(() => {
            status.innerHTML += রিপোর্ট নং ${count} পাঠানো হচ্ছে... সফল!<br>;
            status.scrollTop = status.scrollHeight;
            count++;
            
            if (count > 100) { // ডেমো হিসেবে ১০০ বার দেখাবে
                clearInterval(interval);
                status.innerHTML += "অটোমেশন মোড সক্রিয় রাখা হয়েছে।";
            }
        }, 1500);
    }
</script>

</body>
</html>
