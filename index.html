<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSB ADVANCED PROTOCOL</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-red: #ff003c;
            --cyber-blue: #00d2ff;
            --dark-core: #050505;
        }

        body {
            background-color: var(--dark-core);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .main-frame {
            width: 95%;
            max-width: 600px;
            border: 2px solid var(--cyber-blue);
            background: rgba(0, 210, 255, 0.02);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.2);
            padding: 20px;
            position: relative;
        }

        .header-glitch {
            text-align: center;
            font-size: 1.5rem;
            color: var(--cyber-blue);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-shadow: 2px 2px var(--neon-red);
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid var(--cyber-blue);
            color: var(--neon-green);
            outline: none;
            box-sizing: border-box;
        }

        .report-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .category-node {
            border: 1px solid #333;
            padding: 10px;
            font-size: 0.8rem;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            transition: 0.3s;
        }

        .category-node:hover {
            border-color: var(--neon-green);
            color: var(--neon-green);
        }

        .terminal-log {
            height: 150px;
            background: #000;
            border: 1px solid #222;
            padding: 10px;
            font-size: 0.75rem;
            color: var(--neon-green);
            overflow-y: auto;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px #000;
        }

        .btn-strike {
            width: 100%;
            padding: 15px;
            background: var(--neon-red);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px var(--neon-red);
        }

        .btn-strike:hover {
            filter: brightness(1.2);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            margin-top: 10px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="main-frame">
    <div class="header-glitch">CSB PROTOCOL v7.0</div>
    
    <div class="input-group">
        <input type="text" id="target" placeholder="TARGET_ID_IDENTIFIED: [NULL]">
    </div>

    <div class="report-grid">
        <div class="category-node">[01] Under 18 Issue</div>
        <div class="category-node">[02] Harassment</div>
        <div class="category-node">[03] Self-Harm</div>
        <div class="category-node">[04] Violence</div>
        <div class="category-node">[05] Restricted Goods</div>
        <div class="category-node">[06] Adult Content</div>
        <div class="category-node">[07] Fraud/Scam</div>
        <div class="category-node">[08] IP Violation</div>
    </div>

    <div class="terminal-log" id="log">
        > SYSTEM STANDBY...<br>
        > WAITING FOR TARGET INPUT...
    </div>

    <button class="btn-strike" onclick="startSequence()">Initialize Multi-Report Sequence</button>

    <div class="status-bar">
        <span>ENCRYPTION: AES-256</span>
        <span id="ip-display">IP: STABLE</span>
        <span>ENGINE: CYBER-SENTINEL</span>
    </div>
</div>

<script>
    function startSequence() {
        const log = document.getElementById('log');
        const target = document.getElementById('target').value || "UNKNOWN";
        const ipDisplay = document.getElementById('ip-display');
        
        let i = 0;
        const messages = [
            `> INITIALIZING PROTOCOL FOR: ${target}`,
            "> ROTATING PROXY SERVERS...",
            "> IP CHANGED: 45.12.11.**",
            "> SENDING CATEGORY [01] REPORT...",
            "> SUCCESS. ROTATING IP...",
            "> IP CHANGED: 103.4.92.***",
            "> SENDING CATEGORY [02] REPORT...",
            "> RELAYING VIA CLOUD-NODE...",
            "> MULTI-THREADING ENABLED...",
            "> RE-CHECKING TARGET STATUS..."
        ];

        const interval = setInterval(() => {
            if (i < messages.length) {
                log.innerHTML += `<br> ${messages[i]}`;
                log.scrollTop = log.scrollHeight;
                
                if(messages[i].includes("IP CHANGED")) {
                    ipDisplay.innerText = messages[i].replace("> ", "");
                    ipDisplay.style.color = "#39ff14";
                }
                i++;
            } else {
                log.innerHTML += `<br> <span style="color: #ff003c">> LOOPING SEQUENCE: UNLIMITED MODE ACTIVE</span>`;
                log.scrollTop = log.scrollHeight;
                // এই জায়গায় আপনি আপনার রিয়াল লজিক সিমুলেশন রাখতে পারেন।
            }
        }, 800);
    }
</script>

</body>
</html>
