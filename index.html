<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অটো ফেসবুক আইডি রিপোর্ট | Cyber Sentinel Bangladesh</title>
    <style>
        :root {
            --primary-glow: #00f2ff;
            --secondary-glow: #7000ff;
            --bg-color: #0a0a0b;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }

        h1 {
            font-size: 24px;
            color: var(--primary-glow);
            text-shadow: 0 0 10px var(--primary-glow);
            margin-bottom: 5px;
        }

        .team-name {
            font-size: 14px;
            color: var(--secondary-glow);
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #111;
            color: #fff;
            outline: none;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            border-color: var(--primary-glow);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .btn-report {
            background: linear-gradient(45deg, var(--secondary-glow), var(--primary-glow));
            border: none;
            padding: 12px 30px;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        .btn-report:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #888;
        }

        .footer b {
            color: #ddd;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>অটো ফেসবুক আইডি রিপোর্ট</h1>
        <div class="team-name">Cyber Sentinel Bangladesh</div>
        
        <input type="text" id="fb-link" placeholder="ফেসবুক আইডি বা প্রোফাইল লিংক দিন...">
        
        <button class="btn-report" onclick="startProcess()">রিপোর্ট শুরু করুন</button>

        <div id="status" style="margin-top: 20px; color: var(--primary-glow); display: none;">
            প্রসেসিং শুরু হচ্ছে...
        </div>

        <div class="footer">
            Developer: <b>Net Joddha</b><br>
            © 2026 CSB Cyber Security Tool
        </div>
    </div>

    <script>
        function startProcess() {
            const link = document.getElementById('fb-link').value;
            if(link === "") {
                alert("দয়া করে একটি লিংক দিন।");
                return;
            }
            document.getElementById('status').style.display = "block";
            document.getElementById('status').innerText = "ফেসবুক সিকিউরিটি প্রটোকল যাচাই করা হচ্ছে...";
            
            // Note: Actual mass reporting backend logic is restricted due to security policies.
        }
    </script>
</body>
</html>
